<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cinesearch</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/stylesheets/style.css">
</head>

<body>
<div class="container">
    <div class="eyebrow">Now Screening</div>
    <h1>Cinesearch</h1>

    <form id="lookupFormTitle">
        <input id="movieName" type="text" value="" placeholder="Movie Name" />
        <button id="lookupBtn2" type="submit">Find</button>
    </form>

    <form id="lookupForm">
        <input id="movieId" type="number" value="" placeholder="Movie ID" />
        <button id="lookupBtn" type="submit">Find</button>
    </form>

    <div class="status-msg" id="statusMsg"></div>

    <div class="movie-list" id="movieList"></div>

    <div class="ticket" id="ticket">
        <div class="ticket-main">
            <img class="poster" id="poster" src="" alt="" />
            <div class="info">
                <div class="title-row">
                    <div>
                        <div class="movie-title" id="movieTitle"></div>
                        <div class="tagline" id="movieTagline"></div>
                    </div>
                    <div class="score-ring" id="scoreRing">
                        <div class="score-ring-inner" id="scoreValue"></div>
                    </div>
                </div>
                <div class="meta-row" id="metaRow"></div>
                <div class="overview" id="movieOverview"></div>
            </div>
        </div>
        <div class="perforation"></div>
        <div class="ticket-footer">
            <span id="footerId"></span>
        </div>
    </div>
</div>
<script type="text/javascript" src="/javascripts/scripts.js"></script>
</body>
</html>
