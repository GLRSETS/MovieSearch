<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>REST Client</title>
</head>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    .container {
        height: 100vh;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
    }
    form {
        display: flex;
        flex-direction: column;
        margin-bottom: 20px;
    }
    label,
    input[type="submit"],
    input[type="button"] {
        margin-top: 20px;
    }
</style>
<body>
<div class="container">
    <h1>Movie Lookup</h1>
    <form>
        <label>Movie ID:</label>
        <input id="movieId" type="number" value="11" />
        <input id="lookupBtn" type="button" value="Look Up"/>
    </form>
    <div class="result">Click Look Up!</div>
</div>
<script type="text/javascript" src="/javascripts/scripts.js"></script>
</body>
</html>
